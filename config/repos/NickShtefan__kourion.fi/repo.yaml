# Normalized slice of the kourion.fi reference repo (the proven single-repo PoC).
# `_`-prefixed dirs are ignored by the loader — this is a fixture/template, not a live repo.
repo:
  id: NickShtefan/kourion.fi
  enabled: true
  defaultBranch: main
events:
  triggers: [opened, reopened, synchronize, ready_for_review]
  ignoreDraft: true
  ignorePaths: ["**/*.lock", "**/dist/**", "**/node_modules/**"]
review:
  defaultProfile: security-baseline
  incremental: true
  depthPolicy: risk_aware
  maxTokensPerRun: 120000
runner:
  policy: cost_first
  default: codex-cli           # codex exec on the ChatGPT subscription; switched from claude-cli per Nick 2026-07-11 to the new GPT-5.6 family.
  model: gpt-5.6-sol           # GPT-5.6 Sol — flagship tier (detail/polish), GA 2026-07-09. Passed to codex via -m.
  reasoningEffort: max         # max single-agent depth (NOT ultra/parallel). 5.6 supports max first-class; runner clamp removed.
  overrides: []                # codex-cli for everything — no per-size routing
publish:
  mode: single_top_level_comment
  formalReview: false
  includeHeadSha: true
  upsert: per_head_sha
context:
  source: hybrid
  packRef: context-pack@v1
security:
  baseline: default
  extra:
    - "Wallet addresses, portfolio contents, and analytics payloads are sensitive even when not classic PII."
    - "Any new public endpoint is a possible data-exfiltration surface."
